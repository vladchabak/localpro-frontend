name: localpro_mobile
description: LocalPro — mobile marketplace for local services
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  json_annotation: ^4.9.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location
  geolocator: ^11.0.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1

  # WebSocket
  stomp_dart_client: ^3.0.1

  # UI
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
